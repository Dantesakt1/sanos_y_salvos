spring.application.name=motor-coincidencia
server.port=8084

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Base de datos propia para este microservicio (Aislamiento de datos)
spring.datasource.url=jdbc:mysql://localhost:3306/coincidencia_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

# Configuración de Kafka - PRODUCTOR (Por si el motor necesita emitir eventos después)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Configuración de Kafka - CONSUMIDOR (Corregido)
spring.kafka.consumer.group-id=motor-coincidencias-group-v2
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# Usamos JsonDeserializer para poder leer el objeto MascotaDTO
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# HikariCP
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.maximum-pool-size=10

# Kafka Consumer 
spring.kafka.listener.concurrency=3
spring.kafka.producer.acks=all

# Retry y Circuit Breaker (Nombres corregidos a dbCoincidencias)
resilience4j.retry.instances.dbCoincidencias.maxAttempts=3
resilience4j.retry.instances.dbCoincidencias.waitDuration=1s

resilience4j.circuitbreaker.instances.dbCoincidencias.slidingWindowSize=6
resilience4j.circuitbreaker.instances.dbCoincidencias.failureRateThreshold=50
resilience4j.circuitbreaker.instances.dbCoincidencias.waitDurationInOpenState=20s
resilience4j.circuitbreaker.instances.dbCoincidencias.registerHealthIndicator=true

# --- 1. SEGURIDAD ZERO TRUST (OAuth2 / JWT) ---
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://dev-dantesakt1.us.auth0.com/
spring.security.oauth2.resourceserver.jwt.audiences=https://api-sanosysalvos-auth0/

# Kafka con SSL/SASL
spring.kafka.properties.security.protocol=PLAINTEXT 
spring.kafka.properties.sasl.mechanism=PLAIN
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username='admin' password='password';

# --- 3. SERIALIZACIÓN SEGURA PARA KAFKA ---
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.motor.model

# --- 4. OPTIMIZACIÓN DE RESILIENCIA ---
management.health.circuitbreakers.enabled=true
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info,metrics,resilience4j

# Ignorar las cabeceras de tipo que manda el Productor
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# Forzar a que todo el JSON entrante se convierta a MascotaDTO
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.demo.model.MascotaDTO