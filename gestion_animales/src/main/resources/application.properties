spring.application.name=gestion-animales

server.port=8081

#eureka config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# mysql
spring.datasource.url=jdbc:mysql://localhost:3306/mascotas_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

# Configuración de Kafka - PRODUCTOR
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Configuración de Kafka - CONSUMIDOR (Para mascotas pendientes)
spring.kafka.consumer.group-id=mascotas-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# CORREGIDO A JSON DESERIALIZER
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# HikariCP
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.maximum-pool-size=10

# Kafka Consumer
spring.kafka.listener.concurrency=3
spring.kafka.producer.acks=all

# Retry: Corregido a dbMascotas
resilience4j.retry.instances.dbMascotas.maxAttempts=3
resilience4j.retry.instances.dbMascotas.waitDuration=1s

# Circuit Breaker
resilience4j.circuitbreaker.instances.dbMascotas.slidingWindowSize=6
resilience4j.circuitbreaker.instances.dbMascotas.failureRateThreshold=50
resilience4j.circuitbreaker.instances.dbMascotas.waitDurationInOpenState=20s
resilience4j.circuitbreaker.instances.dbMascotas.registerHealthIndicator=true

# --- 1. SEGURIDAD ZERO TRUST (OAuth2 / JWT) ---
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://dev-dantesakt1.us.auth0.com/
spring.security.oauth2.resourceserver.jwt.audiences=https://api-sanosysalvos-auth0/

# Kafka con SSL/SASL
spring.kafka.properties.security.protocol=PLAINTEXT 
spring.kafka.properties.sasl.mechanism=PLAIN
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username='admin' password='password';

# --- 3. SERIALIZACIÓN SEGURA PARA KAFKA ---
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.demo.model

# --- 4. OPTIMIZACIÓN DE RESILIENCIA ---
management.health.circuitbreakers.enabled=true
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info,metrics,resilience4j